resources:
  jobs:
    global_findex_data_ingestion_job:
      name: global_findex_data_ingestion
      tags:
        project_name: "global-findex-curator"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: global_findex_data_ingestion_pdf
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/1.3_global_findex_data_ingestion.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"

        - task_key: global_findex_data_ingestion_csv
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/1.5_global_findex_csv_data_ingestion.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
