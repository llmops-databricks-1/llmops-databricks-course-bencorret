resources:
  jobs:
    data-pipeline:
      name: global-findex-data-pipeline
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Europe/Amsterdam"
        pause_status: ${var.schedule_pause_status}
      tags:
        project_name: "global-findex-curator"
        environment: ${bundle.target}
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: preprocessing
          depends_on:
            - task_key: global-findex-data-pipeline
          environment_key: default
          notebook_task:
            notebook_path: deployment_scripts/process_data.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
