# Model configuration
model_config:
  temperature: 0.0
  max_tokens: 2000
  top_p: 0.95

# Vector search configuration
vector_search:
  embedding_dimension: 1024
  similarity_metric: cosine
  num_results: 5
  tool_description: |
    A vector search-based retrieval tool to fetch Global Findex reports material.
    This Databricks Vector Seach index contains the contents of the Global FIndex reports,
    which can be matched with user questions. This tool can be used to check if some research
    topics have already been covered in the reports and need no further anlytical investigations
    using Genie Spaces.

# Chunking configuration
chunking:
  chunk_size: 512
  chunk_overlap: 50
  separator: "\n\n"
